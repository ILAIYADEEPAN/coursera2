<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Through the Lens — Interactive Photo Gallery</title>
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #2a2f42;
      --accent:    #c8a96e;
      --accent2:   #7ecad6;
      --text:      #e8e2d9;
      --muted:     #8a8ea6;
      --overlay-bg:rgba(10, 11, 18, 0.93);
      --radius:    6px;
      --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 3.5rem 1rem 2rem;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 80px;
      height: 2px;
      background: var(--accent);
      margin: 1.4rem auto 0;
    }

    header h1 {
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header h2 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.6rem;
    }

    /* ── Status bar ── */
    #status-bar {
      text-align: center;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      min-height: 1.6rem;
      margin-bottom: 1.8rem;
      transition: opacity var(--transition);
    }

    /* ── Gallery grid ── */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.4rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Figure / Card ── */
    figure {
      margin: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      outline: none;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    figure:hover,
    figure.highlighted {
      transform: translateY(-5px);
      box-shadow: 0 12px 36px rgba(200, 169, 110, 0.18);
      border-color: var(--accent);
    }

    /* Keyboard focus ring — visible and accessible */
    figure:focus {
      outline: 3px solid var(--accent2);
      outline-offset: 3px;
      transform: translateY(-5px);
      box-shadow: 0 12px 36px rgba(126, 202, 214, 0.22);
      border-color: var(--accent2);
    }

    .img-wrap {
      overflow: hidden;
      aspect-ratio: 4 / 3;
      position: relative;
    }

    figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    figure:hover img,
    figure.highlighted img,
    figure:focus img {
      transform: scale(1.07);
    }

    /* Hover caption overlay */
    .img-caption-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(10,11,18,0.85) 0%, transparent 100%);
      padding: 2rem 1rem 0.8rem;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    figure:hover .img-caption-overlay,
    figure.highlighted .img-caption-overlay,
    figure:focus .img-caption-overlay {
      opacity: 1;
    }

    .img-caption-overlay p {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    figcaption {
      padding: 0.75rem 1rem 0.9rem;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
    }

    figcaption strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox-inner {
      position: relative;
      max-width: 860px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: lb-in 0.28s ease;
    }

    @keyframes lb-in {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #lightbox img {
      width: 100%;
      max-height: 65vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    #lightbox-caption {
      padding: 1rem 1.2rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    #lightbox-caption strong {
      display: block;
      color: var(--text);
      font-size: 1.05rem;
      margin-bottom: 0.3rem;
    }

    #lightbox-close {
      position: absolute;
      top: 0.7rem; right: 0.8rem;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      transition: background var(--transition);
    }

    #lightbox-close:hover,
    #lightbox-close:focus {
      background: rgba(255,255,255,0.1);
      outline: 2px solid var(--accent2);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 3.5rem;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Skip link ── */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0;
      background: var(--accent);
      color: #000;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: bold;
      z-index: 10000;
      border-radius: 0 0 4px 0;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>

  <!-- Accessibility: skip navigation link -->
  <a class="skip-link" href="#gallery">Skip to gallery</a>

  <header>
    <h1>Nature <span>Through</span> the Lens</h1>
    <h2>An Interactive Photo Gallery</h2>
  </header>

  <!-- Live region for screen reader announcements -->
  <div id="status-bar" role="status" aria-live="polite" aria-atomic="true">&nbsp;</div>

  <!-- ── Gallery ── -->
  <main>
    <section id="gallery" aria-label="Photo gallery">

      <figure
        onmouseover="highlightFigure(this, 'Mountain Summit')"
        onmouseleave="unhighlightFigure(this)"
        onfocus="highlightFigure(this, 'Mountain Summit')"
        onblur="unhighlightFigure(this)"
        onclick="openLightbox(this)"
        onkeydown="handleKeydown(event, this)"
        role="button"
        aria-label="Mountain Summit — click or press Enter to view full image"
      >
        <div class="img-wrap">
          <img
            src="Mountain summit.jpg"
            alt="Snow-capped mountain peaks rising above misty clouds at golden hour"
            width="800"
            height="600"
          />
          <div class="img-caption-overlay" aria-hidden="true"><p>View full image</p></div>
        </div>
        <figcaption>
          <strong>Mountain Summit</strong>
          Snow-capped peaks above the clouds
        </figcaption>
      </figure>

      <figure
        onmouseover="highlightFigure(this, 'Forest Path')"
        onmouseleave="unhighlightFigure(this)"
        onfocus="highlightFigure(this, 'Forest Path')"
        onblur="unhighlightFigure(this)"
        onclick="openLightbox(this)"
        onkeydown="handleKeydown(event, this)"
        role="button"
        aria-label="Forest Path — click or press Enter to view full image"
      >
        <div class="img-wrap">
          <img
            src="forest path.jpg"
            alt="Narrow dirt path winding through a dense green forest with light filtering through the tree canopy"
            width="800"
            height="600"
          />
          <div class="img-caption-overlay" aria-hidden="true"><p>View full image</p></div>
        </div>
        <figcaption>
          <strong>Forest Path</strong>
          Light filtering through ancient trees
        </figcaption>
      </figure>

      <figure
        onmouseover="highlightFigure(this, 'Ocean Waves')"
        onmouseleave="unhighlightFigure(this)"
        onfocus="highlightFigure(this, 'Ocean Waves')"
        onblur="unhighlightFigure(this)"
        onclick="openLightbox(this)"
        onkeydown="handleKeydown(event, this)"
        role="button"
        aria-label="Ocean Waves — click or press Enter to view full image"
      >
        <div class="img-wrap">
          <img
            src="ocean waves.jpg"
            alt="Turquoise ocean waves crashing on a sandy beach under a clear blue sky"
            width="800"
            height="600"
          />
          <div class="img-caption-overlay" aria-hidden="true"><p>View full image</p></div>
        </div>
        <figcaption>
          <strong>Ocean Waves</strong>
          Turquoise waters meet the shore
        </figcaption>
      </figure>

      <figure
        onmouseover="highlightFigure(this, 'Desert Dunes')"
        onmouseleave="unhighlightFigure(this)"
        onfocus="highlightFigure(this, 'Desert Dunes')"
        onblur="unhighlightFigure(this)"
        onclick="openLightbox(this)"
        onkeydown="handleKeydown(event, this)"
        role="button"
        aria-label="Desert Dunes — click or press Enter to view full image"
      >
        <div class="img-wrap">
          <img
            src="dessert dunes.jpg"
            alt="Vast orange sand dunes stretching to the horizon under a warm sunset sky"
            width="800"
            height="600"
          />
          <div class="img-caption-overlay" aria-hidden="true"><p>View full image</p></div>
        </div>
        <figcaption>
          <strong>Desert Dunes</strong>
          Endless sands at sunset
        </figcaption>
      </figure>

      <figure
        onmouseover="highlightFigure(this, 'Waterfall Cascade')"
        onmouseleave="unhighlightFigure(this)"
        onfocus="highlightFigure(this, 'Waterfall Cascade')"
        onblur="unhighlightFigure(this)"
        onclick="openLightbox(this)"
        onkeydown="handleKeydown(event, this)"
        role="button"
        aria-label="Waterfall Cascade — click or press Enter to view full image"
      >
        <div class="img-wrap">
          <img
            src="waterfall cascade.jpg"
            alt="Tall waterfall cascading down mossy green rocks into a clear pool surrounded by lush vegetation"
            width="800"
            height="600"
          />
          <div class="img-caption-overlay" aria-hidden="true"><p>View full image</p></div>
        </div>
        <figcaption>
          <strong>Waterfall Cascade</strong>
          Rushing water through emerald cliffs
        </figcaption>
      </figure>

      <figure
        onmouseover="highlightFigure(this, 'Starry Night')"
        onmouseleave="unhighlightFigure(this)"
        onfocus="highlightFigure(this, 'Starry Night')"
        onblur="unhighlightFigure(this)"
        onclick="openLightbox(this)"
        onkeydown="handleKeydown(event, this)"
        role="button"
        aria-label="Starry Night — click or press Enter to view full image"
      >
        <div class="img-wrap">
          <img
            src="starry night.jpg"
            alt="Brilliant Milky Way galaxy stretching across a dark starry sky above snow-covered mountain peaks"
            width="800"
            height="600"
          />
          <div class="img-caption-overlay" aria-hidden="true"><p>View full image</p></div>
        </div>
        <figcaption>
          <strong>Starry Night</strong>
          The Milky Way above the peaks
        </figcaption>
      </figure>

    </section>
  </main>

  <!-- ── Lightbox ── -->
  <div
    id="lightbox"
    role="dialog"
    aria-modal="true"
    aria-labelledby="lightbox-title"
    aria-describedby="lightbox-caption"
  >
    <div id="lightbox-inner">
      <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close image viewer">&times;</button>
      <img id="lightbox-img" src="" alt="" />
      <div id="lightbox-caption">
        <strong id="lightbox-title"></strong>
        <span id="lightbox-desc"></span>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2024 Nature Through the Lens &mdash; Accessible Interactive Photo Gallery</p>
  </footer>

  <script>
    /* ───────────────────────────────────────────────
       STATUS BAR HELPER
    ─────────────────────────────────────────────── */
    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    /* ───────────────────────────────────────────────
       MOUSE / FOCUS EVENTS
    ─────────────────────────────────────────────── */
    function highlightFigure(fig, title) {
      fig.classList.add('highlighted');
      setStatus('Viewing: ' + title + ' — Press Enter or click to enlarge');
    }

    function unhighlightFigure(fig) {
      fig.classList.remove('highlighted');
      setStatus('\u00a0'); // non-breaking space keeps layout stable
    }

    /* ───────────────────────────────────────────────
       KEYBOARD EVENT — Enter / Space to activate
    ─────────────────────────────────────────────── */
    function handleKeydown(event, fig) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openLightbox(fig);
      }
      if (event.key === 'Escape') {
        closeLightbox();
      }
    }

    /* ───────────────────────────────────────────────
       LIGHTBOX
    ─────────────────────────────────────────────── */
    var _lastFocused = null;

    function openLightbox(fig) {
      var img      = fig.querySelector('img');
      var caption  = fig.querySelector('figcaption strong');
      var desc     = fig.querySelector('figcaption');

      _lastFocused = fig;

      document.getElementById('lightbox-img').src   = img.src;
      document.getElementById('lightbox-img').alt   = img.alt;
      document.getElementById('lightbox-title').textContent = caption ? caption.textContent : '';
      document.getElementById('lightbox-desc').textContent  =
        desc ? desc.textContent.replace(caption ? caption.textContent : '', '').trim() : '';

      var lb = document.getElementById('lightbox');
      lb.classList.add('open');
      setStatus('Lightbox open. Press Escape or click × to close.');
      document.getElementById('lightbox-close').focus();
    }

    function closeLightbox() {
      var lb = document.getElementById('lightbox');
      lb.classList.remove('open');
      setStatus('\u00a0');
      if (_lastFocused) { _lastFocused.focus(); }
    }

    // Close lightbox when clicking the backdrop
    document.getElementById('lightbox').addEventListener('click', function (e) {
      if (e.target === this) { closeLightbox(); }
    });

    // Trap Escape key globally to close lightbox
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
        closeLightbox();
      }
    });

    /* ───────────────────────────────────────────────
       ONLOAD — automatically add tabindex to figures
    ─────────────────────────────────────────────── */
    window.onload = function addTabindexToFigures() {
      console.log('Page loaded — adding tabindex attributes to all gallery figures.');

      var figures = document.querySelectorAll('#gallery figure');

      for (var i = 0; i < figures.length; i++) {
        figures[i].setAttribute('tabindex', '0');
        console.log('tabindex="0" added to figure ' + (i + 1));
      }

      setStatus('Gallery ready. Use Tab to navigate, Enter or Space to open an image.');

      // Clear the ready message after 4 seconds
      setTimeout(function () {
        setStatus('\u00a0');
      }, 4000);
    };
  </script>

</body>
</html>
